<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Image Upload</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#cfbcff",
                        "tertiary-fixed": "#ffdf93",
                        "inverse-on-surface": "#322f35",
                        "background": "#141218",
                        "on-secondary-fixed-variant": "#4b4263",
                        "secondary-fixed-dim": "#cdc0e9",
                        "primary-fixed-dim": "#cfbcff",
                        "on-primary": "#381e72",
                        "on-tertiary-fixed-variant": "#594400",
                        "on-error-container": "#ffdad6",
                        "surface-bright": "#3b383e",
                        "surface-tint": "#cfbcff",
                        "on-tertiary": "#3e2e00",
                        "error-container": "#93000a",
                        "on-primary-container": "#e0d2ff",
                        "inverse-primary": "#6750a4",
                        "on-secondary": "#342b4b",
                        "primary-fixed": "#e9ddff",
                        "tertiary": "#e7c365",
                        "surface-container-highest": "#36343a",
                        "on-error": "#690005",
                        "tertiary-fixed-dim": "#e7c365",
                        "on-tertiary-container": "#503d00",
                        "surface-container-low": "#1d1b20",
                        "inverse-surface": "#e6e0e9",
                        "surface-variant": "#36343a",
                        "outline-variant": "#494551",
                        "on-secondary-fixed": "#1f1635",
                        "surface-dim": "#141218",
                        "primary-container": "#6750a4",
                        "on-surface": "#e6e0e9",
                        "on-primary-fixed-variant": "#4f378a",
                        "secondary": "#cdc0e9",
                        "secondary-container": "#4d4465",
                        "secondary-fixed": "#e9ddff",
                        "on-tertiary-fixed": "#241a00",
                        "outline": "#948e9c",
                        "surface-container": "#211f24",
                        "tertiary-container": "#c9a74d",
                        "error": "#ffb4ab",
                        "surface": "#141218",
                        "surface-container-high": "#2b292f",
                        "on-secondary-container": "#bfb2da",
                        "on-background": "#e6e0e9",
                        "surface-container-lowest": "#0f0d13",
                        "on-surface-variant": "#cbc4d2",
                        "on-primary-fixed": "#22005d"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "margin-mobile": "16px",
                        "container-padding": "24px",
                        "max-width": "1280px",
                        "gutter": "16px",
                        "base": "8px",
                        "margin-desktop": "48px"
                    },
                    "fontFamily": {
                        "body-md": ["Hanken Grotesk"],
                        "headline-lg": ["Hanken Grotesk"],
                        "headline-xl": ["Hanken Grotesk"],
                        "headline-md": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"],
                        "label-mono": ["JetBrains Mono"],
                        "body-sm": ["Hanken Grotesk"]
                    },
                    "fontSize": {
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "400" }],
                        "headline-lg": ["32px", { "lineHeight": "1.25", "fontWeight": "600" }],
                        "headline-xl": ["40px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "headline-md": ["24px", { "lineHeight": "1.3", "fontWeight": "600" }],
                        "body-lg": ["18px", { "lineHeight": "1.6", "fontWeight": "400" }],
                        "label-mono": ["12px", { "lineHeight": "1", "letterSpacing": "0.05em", "fontWeight": "500" }],
                        "body-sm": ["14px", { "lineHeight": "1.4", "fontWeight": "400" }]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-surface-elevated {
            background-color: #303B45;
        }
        .bg-base-dark {
            background-color: #26313A;
        }
        .gradient-text {
            background: linear-gradient(90deg, #cfbcff, #7C4DFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .gradient-bg {
            background: linear-gradient(90deg, #6750a4, #7C4DFF);
        }
        .hover-glow:hover {
            box-shadow: 0 0 15px rgba(124, 77, 255, 0.5);
        }
        .focus-glow:focus-within {
            box-shadow: 0 0 15px rgba(124, 77, 255, 0.3);
            border-color: #7C4DFF;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-base-dark text-on-surface min-h-screen flex flex-col font-body-md antialiased selection:bg-primary selection:text-on-primary">
<!-- Top Navigation (Transactional intent, suppressed Bottom Nav, custom top bar for flow) -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-margin-mobile h-16 bg-surface-container-lowest shadow-sm">
<button class="flex items-center justify-center p-2 text-on-surface hover:bg-surface-variant/20 rounded-full transition-colors duration-200">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<div class="text-headline-md font-headline-md font-bold text-on-background">도핑수첩</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-max-width mx-auto px-margin-mobile md:px-margin-desktop pt-24 pb-32">
<!-- Progress & Header -->
<div class="mb-8 flex flex-col items-center justify-center text-center">
<span class="text-label-mono font-label-mono text-primary mb-2 tracking-widest uppercase">Step 2 of 5</span>
<h1 class="text-headline-lg font-headline-lg text-on-surface mb-2">이미지 업로드</h1>
<p class="text-body-md font-body-md text-on-surface-variant max-w-lg">정확한 성분 분석을 위해 명확하게 보이는 이미지를 업로드해 주세요.</p>
</div>
<!-- Bento Grid Layout -->
<div class="grid grid-cols-1 md:grid-cols-12 gap-gutter max-w-4xl mx-auto">
<!-- Type Selection Card (4 columns on desktop) -->
<div class="md:col-span-4 bg-surface-elevated rounded-[24px] p-6 shadow-[0_8px_32px_rgba(0,0,0,0.15)] backdrop-blur-md flex flex-col gap-4 border border-outline-variant/30">
<h2 class="text-body-lg font-body-lg font-semibold text-on-surface border-b border-outline-variant/50 pb-3 mb-2">분석 유형 선택</h2>
<div class="flex flex-col gap-3">
<label class="relative flex items-center p-4 rounded-xl border border-primary bg-primary/10 cursor-pointer transition-all duration-200 hover:bg-primary/20">
<input checked="" class="sr-only" name="upload_type" type="radio" value="pouch"/>
<span class="material-symbols-outlined text-primary mr-3" style="font-variation-settings: 'FILL' 1;">medical_services</span>
<span class="text-body-md font-body-md text-on-surface font-medium flex-1">약 봉투/약 상자</span>
<span class="material-symbols-outlined text-primary text-sm">check_circle</span>
</label>
<label class="relative flex items-center p-4 rounded-xl border border-outline-variant bg-surface-container hover:bg-surface-variant/50 cursor-pointer transition-all duration-200">
<input class="sr-only" name="upload_type" type="radio" value="prescription"/>
<span class="material-symbols-outlined text-on-surface-variant mr-3">receipt_long</span>
<span class="text-body-md font-body-md text-on-surface-variant flex-1">처방전</span>
</label>
<label class="relative flex items-center p-4 rounded-xl border border-outline-variant bg-surface-container hover:bg-surface-variant/50 cursor-pointer transition-all duration-200">
<input class="sr-only" name="upload_type" type="radio" value="label"/>
<span class="material-symbols-outlined text-on-surface-variant mr-3">info</span>
<span class="text-body-md font-body-md text-on-surface-variant flex-1">성분표/보충제 라벨</span>
</label>
</div>
</div>
<!-- Upload Area (8 columns on desktop) -->
<div class="md:col-span-8 flex flex-col gap-gutter">
<!-- Dropzone -->
<div class="bg-surface-elevated rounded-[24px] p-8 shadow-[0_8px_32px_rgba(0,0,0,0.15)] border-2 border-dashed border-outline-variant hover:border-primary transition-colors duration-300 flex flex-col items-center justify-center min-h-[300px] cursor-pointer group focus-glow">
<div class="w-20 h-20 rounded-full bg-surface-container-high flex items-center justify-center mb-6 group-hover:bg-primary/20 transition-colors duration-300">
<span class="material-symbols-outlined text-4xl text-on-surface-variant group-hover:text-primary transition-colors duration-300">cloud_upload</span>
</div>
<h3 class="text-headline-md font-headline-md text-on-surface mb-2">이미지를 여기에 놓으세요</h3>
<p class="text-body-md font-body-md text-on-surface-variant mb-6 text-center">또는 클릭하여 기기에서 찾아보기<br/><span class="text-sm opacity-70">PNG, JPG, HEIC (최대 10MB)</span></p>
<button class="bg-surface-container-high text-on-surface px-6 py-2 rounded-full border border-outline-variant hover:bg-surface-variant transition-colors text-body-sm font-body-sm">
                        파일 선택
                    </button>
</div>
<!-- Warning Message -->
<div class="bg-error-container/10 border border-error/20 rounded-xl p-4 flex items-start gap-3 backdrop-blur-sm">
<span class="material-symbols-outlined text-error mt-0.5">warning</span>
<div>
<h4 class="text-body-sm font-body-sm text-error font-semibold mb-1">개인정보 보호 안내</h4>
<p class="text-body-sm font-body-sm text-on-surface-variant leading-relaxed">주민번호, 카드번호, 주소 등 민감정보가 보이면 업로드 전 반드시 가려주세요. 분석 목적 외에는 저장되지 않습니다.</p>
</div>
</div>
</div>
</div>
</main>
<!-- Bottom Action Bar (Contextual CTA) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container-highest/90 backdrop-blur-xl border-t border-outline-variant/20 p-4 pb-safe z-40">
<div class="max-w-4xl mx-auto flex justify-end gap-4 items-center">
<button class="px-6 py-3 rounded-full text-on-surface-variant hover:text-on-surface transition-colors font-body-md text-body-md">
                건너뛰기
            </button>
<button class="gradient-bg hover-glow text-white px-8 py-3 rounded-full font-headline-md text-body-lg flex items-center gap-2 transition-all duration-300 opacity-50 cursor-not-allowed">
                분석 정보 입력하기
                <span class="material-symbols-outlined text-sm">arrow_forward</span>
</button>
</div>
</div>
</body></html>
